name: Sync Upstream & Build Docker

on:
  schedule:
    # Every day at midnight UTC
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  sync:
    name: Sync with upstream
    runs-on: ubuntu-latest
    outputs:
      has_new_commits: ${{ steps.check.outputs.has_new_commits }}
      new_tags: ${{ steps.check_tags.outputs.new_tags }}
    steps:
      - name: Checkout fork
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/EddyMcNut/uc-intg-onkyo-avr.git
          git fetch upstream main
          git fetch upstream --tags

      - name: Check for new upstream commits
        id: check
        run: |
          BEHIND=$(git rev-list --count HEAD..upstream/main)
          echo "Upstream is $BEHIND commit(s) ahead"
          if [ "$BEHIND" -eq 0 ]; then
            echo "has_new_commits=false" >> $GITHUB_OUTPUT
          else
            echo "has_new_commits=true" >> $GITHUB_OUTPUT
          fi

      - name: Check for new upstream tags
        id: check_tags
        run: |
          FORK_TAGS=$(git ls-remote --tags origin 'refs/tags/v*' | grep -v '\^{}' | sed 's|.*refs/tags/||')
          NEW_TAGS=""
          while IFS= read -r tag; do
            if ! echo "$FORK_TAGS" | grep -qx "$tag"; then
              NEW_TAGS="$NEW_TAGS $tag"
            fi
          done < <(git tag -l 'v*' | sort -V)
          NEW_TAGS="${NEW_TAGS% }"
          echo "new_tags=$NEW_TAGS" >> $GITHUB_OUTPUT
          echo "New tags found: $NEW_TAGS"

      - name: Merge upstream changes
        if: steps.check.outputs.has_new_commits == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Use --no-commit so we can restore .github/ before the merge commit is created.
          # This prevents workflow file changes from ever appearing in a pushed commit,
          # which would require 'workflows' permission that GITHUB_TOKEN does not have.
          git merge upstream/main --no-commit --no-ff -X theirs
          git checkout HEAD -- .github/
          git add .github/
          git commit --allow-empty --no-edit
          git push origin main

      - name: Push new upstream tags to fork
        if: steps.check_tags.outputs.new_tags != ''
        run: |
          for tag in ${{ steps.check_tags.outputs.new_tags }}; do
            git push origin "refs/tags/$tag" && echo "Pushed tag $tag" \
              || echo "Warning: could not push tag $tag (may already exist)"
          done

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: sync
    if: needs.sync.outputs.has_new_commits == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Read version from package.json
        id: pkg
        run: echo "version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/uc-intg-onkyo-avr
          tags: |
            type=raw,value=${{ steps.pkg.outputs.version }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    name: Mirror upstream releases
    runs-on: ubuntu-latest
    needs: sync
    if: needs.sync.outputs.new_tags != ''
    steps:
      - name: Create releases for new tags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          for tag in ${{ needs.sync.outputs.new_tags }}; do
            VERSION="${tag#v}"

            # Fetch release body from upstream
            UPSTREAM_RELEASE=$(curl -sf \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/EddyMcNut/uc-intg-onkyo-avr/releases/tags/${tag}") || {
              echo "Could not fetch upstream release for $tag, skipping"
              continue
            }

            RELEASE_NAME=$(echo "$UPSTREAM_RELEASE" | jq -r '.name // empty')
            RELEASE_BODY=$(echo "$UPSTREAM_RELEASE" | jq -r '.body // ""')
            IS_PRERELEASE=$(echo "$UPSTREAM_RELEASE" | jq -r '.prerelease')

            DOCKER_SECTION="

## 🐳 Docker Image

Pull this specific version:

\`\`\`bash
docker pull ghcr.io/${REPO_OWNER}/uc-intg-onkyo-avr:${VERSION}
\`\`\`

Or pull the latest version:

\`\`\`bash
docker pull ghcr.io/${REPO_OWNER}/uc-intg-onkyo-avr:latest
\`\`\`"

            FULL_BODY="${RELEASE_BODY}${DOCKER_SECTION}"

            PRERELEASE_FLAG=()
            [ "$IS_PRERELEASE" = "true" ] && PRERELEASE_FLAG=("--prerelease")

            gh release create "$tag" \
              --repo "${REPO_OWNER}/${REPO_NAME}" \
              --title "${RELEASE_NAME:-$tag}" \
              --notes "$FULL_BODY" \
              "${PRERELEASE_FLAG[@]}" \
            && echo "Created release $tag" \
            || echo "Release $tag may already exist, skipping"
          done
