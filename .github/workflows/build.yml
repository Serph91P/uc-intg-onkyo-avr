name: Build and Release

on:
  push:
    branches:
      - "**"
    paths:
      - "**/*.js"
      - "**/*.ts"
      - "logos/**"
      - ".github/**/*.yml"
      - "package-lock.json"
    tags:
      - "v*.*.*"
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

env:
  INTG_NAME: onkyo_avr_custom_driver
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      artifact-name: ${{ steps.set-artifact.outputs.artifact-name }}
      version: ${{ steps.pkg.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Read version from package.json
        id: pkg
        run: |
          VERSION=$(jq -r .version package.json)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Sync driver.json version with package.json
        run: |
          jq --arg ver "$VERSION" '.version = $ver' driver.json > driver.json.tmp && mv driver.json.tmp driver.json

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"

      - name: Build
        run: |
          npm install
          npm run build

      - name: Run tests
        run: |
          npm test
        continue-on-error: false

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: test-results.xml
          if-no-files-found: ignore

      - name: Remove config.json
        run: rm -f config.json

      - name: Get production modules
        run: |
          rm -Rf node_modules
          npm install --production

      - name: Add version
        run: |
          mkdir -p artifacts
          cd artifacts
          echo "$VERSION" > version.txt

      - name: Create custom intg archive
        id: set-artifact
        shell: bash
        run: |
          # Remove compiled tests to keep the artifact small
          rm -rf dist/test

          mv dist artifacts/
          mv artifacts/dist artifacts/bin

          # If build output is under artifacts/bin/src, move files up so packaging is consistent
          if [ -d artifacts/bin/src ]; then
            mv artifacts/bin/src/* artifacts/bin/ || true
            rmdir artifacts/bin/src || true
          fi

          # Ensure artifacts/bin/driver.js is the bootstrapping entry point that
          # instantiates OnkyoDriver.  index.js (compiled from index.ts) does this.
          #
          # If driver.ts was renamed from onkyo.ts, both driver.js (class) and
          # index.js (bootstrapper) now exist.  We can't simply rename index.js
          # over driver.js because index.js imports "./driver.js" – making it
          # reference itself.  Instead:
          #   1. rename driver.js (class) → onkyodriver.js
          #   2. patch the import in index.js to point to onkyodriver.js
          #   3. rename index.js → driver.js  (entry point with instantiation)
          if [ -f artifacts/bin/driver.js ] && [ -f artifacts/bin/index.js ]; then
            echo "Both driver.js and index.js found – renaming class to onkyodriver.js to avoid circular import"
            mv artifacts/bin/driver.js artifacts/bin/onkyodriver.js
            sed -i 's|from "\./driver\.js"|from "./onkyodriver.js"|g' artifacts/bin/index.js
            mv artifacts/bin/index.js artifacts/bin/driver.js
          elif [ -f artifacts/bin/index.js ]; then
            mv artifacts/bin/index.js artifacts/bin/driver.js
          elif [ -f artifacts/bin/driver.js ]; then
            echo "Only driver.js found – using as entry point as-is"
          else
            echo "ERROR: neither artifacts/bin/driver.js nor artifacts/bin/index.js found after layout normalization" >&2
            echo "Contents of artifacts/bin:" && ls -la artifacts/bin || true
            exit 1
          fi

          # Show for debugging
          echo "Artifacts bin contents after normalization:" && ls -la artifacts/bin || true

          cp package.json artifacts/bin/
          mv node_modules artifacts/bin/
          cp driver.json artifacts/

          # Include runtime logo assets used by generated media thumbnails.
          # Copy them both next to the package root and next to the runtime bin
          # so the integration can resolve them in either installation layout.
          if [ -d logos ]; then
            cp -R logos artifacts/
            cp -R logos artifacts/bin/
            echo "Packaged logo assets:" && ls -la artifacts/logos artifacts/bin/logos || true
          fi

          ARTIFACT_NAME="uc-intg-${{ env.INTG_NAME }}-${{ steps.pkg.outputs.version }}"
          echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> $GITHUB_ENV
          echo "artifact-name=$ARTIFACT_NAME" >> $GITHUB_OUTPUT

      - name: Set driver.js as executable
        run: chmod +x artifacts/bin/driver.js

      - name: Create upload artifact
        shell: bash
        run: |
          tar czvf ${{ steps.set-artifact.outputs.artifact-name }}.tar.gz -C ${GITHUB_WORKSPACE}/artifacts .
          ls -lah

      - uses: actions/upload-artifact@v7
        id: upload_artifact
        with:
          name: ${{ steps.set-artifact.outputs.artifact-name }}
          path: ${{ steps.set-artifact.outputs.artifact-name }}.tar.gz
          if-no-files-found: error
          retention-days: 3

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build.outputs.artifact-name }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ needs.build.outputs.artifact-name }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
